version: '3.8'

services:
  basebadge-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - APP_NAME=BaseBadge
      - API_VERSION=v1
      - BACKEND_CORS_ORIGINS=["*"]
      - BASE_NETWORK=base-mainnet
      - CHAIN_ID=8453
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

